- defaults:
          link:
                  create: true
                  relink: true

- clean: ["~"]

- link:
          ~/.aliases: aliases
          ~/.bash_profile: bash_profile
          ~/.gitconfig: gitconfig
          ~/.gitconfig.cern: gitconfig.cern
          ~/.ssh/git_signers: gitconfig.signers
          ~/.gitignore: gitignore
          ~/.ssh/config: sshconfig
          ~/.zshrc: zshrc
          ~/.claude:
                  path: claude
                  if: '[ "$(uname)" = Darwin ]'
          /etc/krb5.conf:
                  path: krb5.conf
                  if: '[ "$(uname)" = Darwin ]'
          ~/krb5.conf:
                  path: krb5.conf
                  if: '[ "$(uname)" = Linux ]'
          /etc/hosts:
                  path: hosts
                  if: '[ "$(uname)" = Linux ] && ! hostname -f 2>/dev/null | grep -q cern.ch'
